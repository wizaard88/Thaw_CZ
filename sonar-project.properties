  **/AppNavigationState.swift,\
  **/SettingsURIHandler.swift,\
  **/Extensions.swift,\
  **/ScreenCapture.swift,\
  **/*Settings.swift,\
  **/*SettingsPane.swift,\
  **/*SettingsView.swift,\
  **/*SettingsWindow.swift,\
  **/*View.swift,\
  **/*Window.swift,\
  **/*Panel.swift,\
  **/*Sheet.swift,\
  **/*Bar.swift,\
  **/*Manager.swift,\
  **/*Coordinator.swift,\
  **/*Controller.swift,\
  **/Bridging/Bridging.swift,\
  **/Bridging/Shims.swift,\
  **/ControlItem/*.swift,\
  **/MenuBarItems/*.swift,\
  **/HotkeyRecorder.swift,\
  **/MenuBarAppearanceEditor.swift,\
  **/SectionedList.swift,\
  **/SharedConstants.swift,\
  **/LayoutBarNewItemsBadgeView.swift,\
  **/NotchIndicatorOverlay.swift,\
  **/MenuBarItemContainer.swift,\
  **/Events/*.swift,\
  **/Hotkeys/*.swift,\
  **/Main/IceApp.swift,\
  **/Main/Updates.swift,\
  **/Main/Navigation/NavigationIdentifiers/*.swift,\
